; PlatformIO Configuration - M25 Wheel RFCOMM Simulator
;
; DO NOT change the platform line.  The pioarduino URL is required for ESP32
; Bluetooth Classic (BluetoothSerial) support on modern framework versions.

[platformio]
src_dir = .

[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32dev
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

build_flags =
    ; Bluetooth Classic (RFCOMM / SPP)
    -DCONFIG_BT_ENABLED=1
    -DCONFIG_BLUEDROID_ENABLED=1
    -DCONFIG_BT_BLUEDROID_ENABLED=1
    -DCONFIG_BT_SPP_ENABLED=1
    -DCONFIG_BT_CLASSIC_ENABLED=1
    ; BLE (keep on so BLE transport option compiles even when disabled at runtime)
    -DCONFIG_BT_BLE_ENABLED=1
    -DCONFIG_GATTC_MAX_CONNECTIONS=2
    -DCONFIG_BT_ACL_CONNECTIONS=4
    ; FreeRTOS / general
    -DCONFIG_FREERTOS_MAX_TASK_NAME_LEN=16
    -DCONFIG_FREERTOS_TASK_NOTIFICATION_ARRAY_ENTRIES=1
    -DCONFIG_LOG_DEFAULT_LEVEL=3
    -DCONFIG_LOG_MAXIMUM_LEVEL=5
    -DCONFIG_LWIP_IPV6=1
    -Wno-macro-redefined

upload_speed = 921600
; Set your actual COM port:
upload_port = COM8

board_build.partitions = default.csv
board_build.filesystem = none

build_src_filter =
    +<*.ino>
    +<*.cpp>
    +<*.c>
    -<.git/>
    -<.pio/>
    -<.vscode/>
    -<test/>
    -<data/>
    -<*.md>
